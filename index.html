<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Rajni ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff4d88,#ff99cc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
width:90%;
max-width:420px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.3);
animation:fade 1.5s;
}

h1{
color:#ff2d75;
margin-bottom:15px;
}

p{
font-size:18px;
margin:10px 0;
line-height:1.6;
}

button{
padding:12px 28px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:10px;
transition:.3s;
}

#yes{
background:#ff2d75;
color:white;
}

#no{
background:#ddd;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>
</head>

<body>

<div class="card">

<h2>💌 From: Prakash ❤️</h2>

<h1>Will You Forever Be Mine? 💍</h1>

<p><b>To: Rajni, Meri Jaan 🤌🏻🎀💗</b></p>

<p>
✨ Every day, you make my world brighter.<br>
Every smile of yours becomes my favorite memory.<br>
I don't just want today with you...<br>
I want every tomorrow with you. 🥹❤️
</p>

<button id="yes" onclick="showBirthday()">YES ❤️</button>
<button id="no" onmouseover="moveNo()">NO 🙈</button>

</div>

<script>

function moveNo(){
let btn=document.getElementById("no");
btn.style.position="absolute";
btn.style.left=Math.random()*80+"%";
btn.style.top=Math.random()*80+"%";
}
function showBirthday(){

document.body.innerHTML=`

<div class="card">

<h1>🎉 Happy Birthday My Princess 🎂❤️</h1>

<img src="rajni.jpg" style="width:220px;border-radius:20px;box-shadow:0 0 20px hotpink;">

<h2>My Jaanu 🫶🎀💖</h2>

<p>

Thank you for accepting my love. ❤️<br><br>

Happy Birthday meri Jaanu 🫶🎀💖❤️! Aaj ka din mere liye sirf tumhara birthday nahi,
meri life ka sabse special din hai. 🥹❤️<br><br>

Tum meri Sweetheart 💖, meri Sweetu 🫶, meri Rasmalai 🍨❤️,
meri duniya ho. Main promise karta hu ki har khushi aur har mushkil me
hamesha tumhare saath rahunga. ❤️<br><br>

Main dil se dua karta hu ki tumhari har wish puri ho,
tum hamesha healthy raho, hamesha haste raho. 🌸✨<br><br>

I Love You Forever & Ever Rajni ❤️💍

</p>

</div>

`;

}
</script>

</body>
</html>
